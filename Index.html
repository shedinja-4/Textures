<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="text/css" rel="stylesheet" href="style.css">
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
      }
    }
    </script>
    <title>Edicion modelos 3d</title>
</head>
<body>
    <main>
        <form class="Descargar">
            <label class="BotonBar" for="ArchivoOBJ" style="color: white;">Importar OBJ</label>
            <input type="file" id="ArchivoOBJ" style="display:none;">
            <label class="BotonBar" for="ArchivoFBX" style="color: white;">Importar FBX</label>
            <input type="file" id="ArchivoFBX" style="display:none;">
        </form>
        <section class="BarraDeBotones">
             <li class="Grilla">
                <div class="BotonBar" onclick="Barra()">Grilla</div>
                <ul class="ContGril" id="Barra">
                    <li class="ContenidoBut"><h6>Mostrar</h6><input type="checkbox" id="GrlVis"></li>
                    <li class="ContenidoBut"><h6>Tamaño</h6><input type="number" min="0" value="10" id="TamGrl"></li>
                    <li class="ContenidoBut"><h6>Divisiones</h6><input type="number" min="0" value="10" id="DivGrl"></li>
                </ul>
            </li>
        </section>
        <section class="BarTex">
            <div class="TexturaPrev">
                <label for="MapC" class="SubirText">Subir</label>
                <input type="file" id="MapC" style="display:none;">
                <div id="ImgC" class="MostrarTextura"></div>
                <h4>Color</h4>
            </div>
            <div class="TexturaPrev">
                <label for="MapM" class="SubirText">Subir</label>
                <input type="file" id="MapM" style="display:none;">
                <div id="ImgM" class="MostrarTextura"></div>
                <h4>Metalness</h4>
            </div>
            <div class="TexturaPrev">
                <label for="MapR" class="SubirText">Subir</label>
                <input type="file" id="MapR" style="display:none;">
                <div id="ImgR" class="MostrarTextura"></div>
                <h4>Roughness</h4>
            </div>
            <div class="TexturaPrev">
                <label for="MapB" class="SubirText">Subir</label>
                <input type="file" id="MapB" style="display:none;">
                <div id="ImgB" class="MostrarTextura"></div>
                <h4>Bump/Height</h4>
                <input type="range" min="0" max="5" value="1" class="slider" step="0.2" id="BumpForce">
            </div>
            <div class="TexturaPrev">
                <label for="MapN" class="SubirText">Subir</label>
                <input type="file" id="MapN" style="display:none;">
                <div id="ImgN" class="MostrarTextura"></div>
                <h4>Normal</h4>
                <input type="range" min="0" max="5" value="1" class="slider" step="0.2" id="NormalForce">
            </div>
        </section>
        <canvas id="Visualizador3D" class="Render"></canvas>
    </main>
    <script src="scriptMain.js"></script>
    <script type="module" src="scriptMod.js"></script>
</body>
</html>
